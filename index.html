<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: MORRIS // 1988</title>
    <style>
        /* 复古CRT显示器风格 */
        body {
            background-color: #0a0a0a;
            color: #4af626;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 30px;
            overflow: hidden;
            text-shadow: 0 0 5px #4af626;
        }

        h1 {
            font-size: 1.2rem;
            border-bottom: 1px dashed #4af626;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        /* 终端输出框 */
        #terminal {
            height: 60vh;
            border: 1px solid #4af626;
            padding: 20px;
            overflow-y: auto;
            background-color: #000;
            box-shadow: inset 0 0 15px rgba(74, 246, 38, 0.2);
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .log-line {
            margin: 5px 0;
        }

        .sys-msg { color: #aaaaaa; text-shadow: none; }
        .alert-msg { color: #ff3333; text-shadow: 0 0 5px #ff3333; }

        /* 闪烁的光标 */
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2em;
            background-color: #4af626;
            vertical-align: text-bottom;
            animation: blink 1s step-end infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* 控制面板按钮 */
        #controls {
            display: flex;
            gap: 15px;
        }

        button {
            background-color: transparent;
            color: #4af626;
            border: 1px solid #4af626;
            padding: 10px 20px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        button:hover:not(:disabled) {
            background-color: #4af626;
            color: #000;
            text-shadow: none;
        }

        button:disabled {
            border-color: #1a4a15;
            color: #1a4a15;
            cursor: not-allowed;
            text-shadow: none;
        }
    </style>
</head>
<body>

    <h1>[ 终端连接建立: 康奈尔大学 // ARPANET 节点 ]</h1>
    
    <div id="terminal">
        <div id="output"></div>
        <span class="cursor" id="cursor"></span>
    </div>

    <div id="controls">
        <button id="btn-compile" onclick="compileCode()">编译核心代码</button>
        <button id="btn-scan" onclick="scanNetwork()" disabled>扫描局域网漏洞</button>
        <button id="btn-release" onclick="releaseWorm()" disabled>注入 ARPANET</button>
    </div>

    <script>
        const output = document.getElementById('output');
        const terminal = document.getElementById('terminal');
        const btnCompile = document.getElementById('btn-compile');
        const btnScan = document.getElementById('btn-scan');
        const btnRelease = document.getElementById('btn-release');

        let isTyping = false;

        // 打字机效果函数
        function typeText(text, className = '', callback = null) {
            if (isTyping) return;
            isTyping = true;
            
            const line = document.createElement('div');
            line.className = `log-line ${className}`;
            output.appendChild(line);
            
            let i = 0;
            const speed = Math.random() * 30 + 20; // 随机打字速度增加真实感

            function type() {
                if (i < text.length) {
                    line.innerHTML += text.charAt(i);
                    i++;
                    terminal.scrollTop = terminal.scrollHeight; // 自动滚动到底部
                    setTimeout(type, speed);
                } else {
                    isTyping = false;
                    if (callback) callback();
                }
            }
            type();
        }

        // 剧情步骤 1：编译
        function compileCode() {
            if (isTyping) return;
            btnCompile.disabled = true;
            
            typeText("> gcc -o worm main.c prop.c", "sys-msg", () => {
                setTimeout(() => {
                    typeText("编译中... 未发现语法错误。", "", () => {
                        typeText("1988年11月2日。你坐在昏暗的机房里。这段不到99行的C代码，即将用来丈量整个互联网的大小。", "", () => {
                            btnScan.disabled = false;
                        });
                    });
                }, 800);
            });
        }

        // 剧情步骤 2：扫描
        function scanNetwork() {
            if (isTyping) return;
            btnScan.disabled = true;

            typeText("> 正在探测周边节点...", "sys-msg", () => {
                setTimeout(() => {
                    typeText("发现目标系统: SunOS 3 & VAX 4 BSD.", "", () => {
                        typeText("漏洞定位成功: sendmail debug 模式开启 | fingerd 存在缓冲区溢出风险。", "", () => {
                            btnRelease.disabled = false;
                        });
                    });
                }, 1000);
            });
        }

        // 剧情步骤 3：释放
        function releaseWorm() {
            if (isTyping) return;
            btnRelease.disabled = true;

            typeText("> ./worm -p 8080 -d", "sys-msg", () => {
                setTimeout(() => {
                    typeText("警告：未设置严格的自我复制上限阀值。这可能导致宿主机器负载过高。", "alert-msg", () => {
                        setTimeout(() => {
                            typeText("忽略警告。正在将 payload 注入网络底层...", "", () => {
                                typeText("程序已脱离终端控制。它开始在暗网中自我繁衍。", "", () => {
                                    setTimeout(() => {
                                        typeText("【系统提示】：你打开了潘多拉的魔盒。等待网络异变的发生吧...", "sys-msg");
                                    }, 1000);
                                });
                            });
                        }, 1500);
                    });
                }, 800);
            });
        }

        // 初始欢迎语
        window.onload = () => {
            setTimeout(() => {
                typeText("System login: root");
            }, 500);
        };
    </script>
</body>
</html>
