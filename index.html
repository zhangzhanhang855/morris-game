<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: MORRIS // 1988</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #4af626;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 30px;
            overflow: hidden;
            text-shadow: 0 0 5px #4af626;
            transition: opacity 2s ease-in-out; /* 用于黑屏过渡 */
        }

        h1 {
            font-size: 1.2rem;
            border-bottom: 1px dashed #4af626;
            padding-bottom: 10px;
            margin-bottom: 20px;
            transition: opacity 1s;
        }

        #terminal {
            height: 70vh;
            border: 1px solid #4af626;
            padding: 20px;
            overflow-y: auto;
            background-color: #000;
            box-shadow: inset 0 0 15px rgba(74, 246, 38, 0.2);
            line-height: 1.6;
            display: flex;
            flex-direction: column;
            transition: all 1s;
        }

        #output { margin-bottom: 10px; }
        .log-line { margin: 5px 0; word-wrap: break-word; }
        
        /* 各种文本样式 */
        .sys-msg { color: #aaaaaa; text-shadow: none; }
        .alert-msg { color: #ff3333; text-shadow: 0 0 5px #ff3333; }
        .user-cmd { color: #fff; text-shadow: none; font-weight: bold; }
        
        /* 新增：致命错误与新闻播报样式 */
        .fatal-error { color: #ff0000; font-weight: bold; text-shadow: 0 0 8px #ff0000; }
        .broadcast { color: #eebb00; font-style: italic; text-shadow: 0 0 5px #eebb00; }
        .glitch { animation: glitch-anim 0.2s infinite; }

        @keyframes glitch-anim {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 1px) }
            40% { transform: translate(-1px, -1px) }
            60% { transform: translate(2px, 1px) }
            80% { transform: translate(1px, -1px) }
            100% { transform: translate(0) }
        }

        #input-line { display: flex; align-items: center; }
        #prompt { margin-right: 10px; }
        #cmd-input {
            background: transparent;
            border: none;
            color: #4af626;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1rem;
            outline: none;
            flex-grow: 1;
            text-shadow: 0 0 5px #4af626;
        }

        /* 黑屏类 */
        .blackout { opacity: 0 !important; }
    </style>
</head>
<body>

    <h1 id="title-bar">[ 终端连接建立: 康奈尔大学 // ARPANET 节点 ]</h1>
    
    <div id="terminal" onclick="document.getElementById('cmd-input').focus()">
        <div id="output"></div>
        <div id="input-line">
            <span id="prompt">root@cornell:~#</span>
            <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" autofocus>
        </div>
    </div>

    <script>
        const output = document.getElementById('output');
        const terminal = document.getElementById('terminal');
        const cmdInput = document.getElementById('cmd-input');
        const inputLine = document.getElementById('input-line');
        const titleBar = document.getElementById('title-bar');

        let gameState = {
            isTyping: false,
            isCompiled: false,
            isScanned: false,
            isReleased: false
        };

        cmdInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !gameState.isTyping && !gameState.isReleased) {
                const command = this.value.trim().toLowerCase();
                if (command) processCommand(command);
                this.value = ''; 
            }
        });

        function processCommand(cmd) {
            echoText(`root@cornell:~# ${cmd}`, "user-cmd");
            switch(cmd) {
                case 'help':
                    typeText("可用指令:\n- ls : 列出当前目录\n- make : 编译程序\n- scan : 扫描节点\n- ./worm : 运行程序", "sys-msg");
                    break;
                case 'ls':
                    typeText("main.c  prop.c  readme.txt", "");
                    break;
                case 'make':
                case 'gcc':
                    if (gameState.isCompiled) typeText("make: 'worm' is up to date.", "sys-msg");
                    else compileCode();
                    break;
                case 'scan':
                    if (!gameState.isCompiled) typeText("错误: 请先执行 make 编译程序。", "alert-msg");
                    else scanNetwork();
                    break;
                case './worm':
                case 'run':
                    if (!gameState.isScanned) typeText("错误: 缺少目标数据，请先执行 scan。", "alert-msg");
                    else releaseWorm();
                    break;
                case 'clear':
                    output.innerHTML = '';
                    break;
                default:
                    typeText(`bash: ${cmd}: command not found`, "alert-msg");
            }
        }

        function echoText(text, className = '') {
            const line = document.createElement('div');
            line.className = `log-line ${className}`;
            line.innerText = text;
            output.appendChild(line);
            scrollToBottom();
        }

        function typeText(text, className = '', callback = null, fastMode = false) {
            if (gameState.isTyping) return;
            gameState.isTyping = true;
            inputLine.style.display = 'none'; 
            
            const line = document.createElement('div');
            line.className = `log-line ${className}`;
            output.appendChild(line);
            
            let i = 0;
            const formattedText = text.replace(/\n/g, '<br>');

            function type() {
                if (i < text.length) {
                    if (text.charAt(i) === '\n') {
                        line.innerHTML += '<br>';
                    } else {
                        line.innerHTML += text.charAt(i);
                    }
                    i++;
                    scrollToBottom();
                    
                    let speed = fastMode ? (Math.random() * 10 + 5) : (Math.random() * 30 + 10);
                    if (!fastMode && ['.', '!', '?'].includes(text.charAt(i-1))) speed += 200;
                    
                    setTimeout(type, speed);
                } else {
                    gameState.isTyping = false;
                    if (!gameState.isReleased) {
                        inputLine.style.display = 'flex'; 
                        cmdInput.focus();
                    }
                    scrollToBottom();
                    if (callback) callback();
                }
            }
            type();
        }

        function scrollToBottom() {
            terminal.scrollTop = terminal.scrollHeight;
        }

        function compileCode() {
            typeText("编译中... gcc -o worm main.c prop.c", "sys-msg", () => {
                setTimeout(() => {
                    typeText("编译完成。未发现语法错误。", "", () => {
                        gameState.isCompiled = true;
                    });
                }, 500);
            });
        }

        function scanNetwork() {
            typeText("正在探测周边节点...", "sys-msg", () => {
                setTimeout(() => {
                    typeText("发现目标系统: SunOS & VAX.\n漏洞定位成功: sendmail debug开启 | fingerd溢出.", "", () => {
                        gameState.isScanned = true;
                    });
                }, 800);
            });
        }

        // ====== 核心：释放蠕虫与黑屏播报逻辑 ======
        function releaseWorm() {
            gameState.isReleased = true; // 锁定输入
            inputLine.style.display = 'none';

            typeText("执行 ./worm -p 8080 -d ...", "sys-msg", () => {
                setTimeout(() => {
                    typeText("【系统提示】：由于你的疏忽，程序缺少了退出机制。\n它已被注入 ARPANET 底层...", "alert-msg", () => {
                        
                        // 1. 触发黑屏
                        setTimeout(() => {
                            document.body.classList.add('blackout');
                            
                            // 2. 黑屏中等待3秒，清理屏幕内容，更换UI样式
                            setTimeout(() => {
                                output.innerHTML = '';
                                titleBar.innerText = "[ 全局监控网络 // 拦截模式 ]";
                                titleBar.style.color = "#ff3333";
                                titleBar.style.borderBottomColor = "#ff3333";
                                terminal.style.borderColor = "#ff3333";
                                terminal.style.boxShadow = "inset 0 0 15px rgba(255, 51, 51, 0.2)";
                                
                                // 3. 解除黑屏，开始播报
                                document.body.classList.remove('blackout');
                                setTimeout(startBroadcast, 1500);
                            }, 2000);

                        }, 2000);
                    });
                }, 1000);
            });
        }

        // 剧情步骤 4：爆发与播报
        function startBroadcast() {
            typeText("=======================================\n>> 时空坐标: 1988年11月2日晚 20:30\n=======================================", "sys-msg", () => {
                setTimeout(() => {
                    typeText("[内核日志] MIT (麻省理工学院) 节点报告：系统负载飙升至 100+... 服务无响应。", "fatal-error", () => {
                        setTimeout(() => {
                            typeText("[内核日志] UC Berkeley (伯克利) 邮件网关崩溃... sendmail 进程发生无限级联复制。", "fatal-error", () => {
                                setTimeout(() => {
                                    typeText("[内核日志] 五角大楼 MILNET 部分节点失去连接... 出现不明数据包洪流！", "fatal-error glitch", () => {
                                        setTimeout(() => {
                                            // 引入新闻播报
                                            typeText("---------------------------------------\n[截获外部无线电信号] 频率 FM 89.3\n...", "sys-msg", () => {
                                                setTimeout(() => {
                                                    typeText("“这里是国家公共广播电台（NPR）紧急插播。就在刚才，一种未知的‘电脑病毒’席卷了全国的计算机网络……”\n“从东海岸的哈佛，到西海岸的斯坦福，超过六千台大型机陷入瘫痪。”\n“军方正在切断 ARPANET 的骨干连接以防止事态扩大。这是人类历史上第一次爆发全国性的赛博灾难……”", "broadcast", () => {
                                                        setTimeout(() => {
                                                            typeText("\n[ 系统挂起 ]\n> 罗伯特·莫尔斯，你闯大祸了。", "fatal-error");
                                                        }, 2000);
                                                    }, false);
                                                }, 1000);
                                            });
                                        }, 1500);
                                    });
                                }, 1500);
                            });
                        }, 1500);
                    });
                }, 1000);
            }, true); // 加速打印标题
        }

        // 初始欢迎语
        window.onload = () => {
            cmdInput.focus();
            setTimeout(() => {
                typeText("System login: root\nType 'help' to see available commands.", "sys-msg");
            }, 500);
        };
    </script>
</body>
</html>
