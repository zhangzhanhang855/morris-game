<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: MORRIS // 1988 - THE END</title>
    <style>
        /* --- 核心背景：动态数字虚空 --- */
        body {
            margin: 0; padding: 0; overflow: hidden;
            background-color: #010501; font-family: 'Courier New', Courier, monospace;
            color: #4af626; text-shadow: 0 0 5px rgba(74, 246, 38, 0.8);
            transition: color 0.5s, text-shadow 0.5s;
        }

        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; opacity: 0.3; transition: opacity 1s;
        }

        /* --- 主显示区 --- */
        #main-wrapper {
            position: relative; width: 100vw; height: 100vh;
            display: flex; flex-direction: column; padding: 40px; box-sizing: border-box;
            background: radial-gradient(circle, rgba(0,0,0,0) 60%, rgba(0,10,0,0.6) 100%);
            z-index: 10; transition: opacity 2s ease-in-out; /* 为结尾淡出准备 */
        }

        #main-wrapper::before {
            content: " "; display: block; position: absolute; top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%);
            background-size: 100% 4px; z-index: 100; pointer-events: none; opacity: 0.6;
        }
        
        @keyframes flicker {
            0% { opacity: 0.982; } 5% { opacity: 0.963; } 10% { opacity: 0.922; }
            15% { opacity: 0.985; } 20% { opacity: 0.941; } 100% { opacity: 0.989; }
        }
        #terminal-content { animation: flicker 0.15s infinite; }

        /* --- 状态样式 --- */
        body.state-crisis { color: #ffaa00; text-shadow: 0 0 8px rgba(255, 170, 0, 0.9); }
        body.state-collapsed { color: #ff3333; text-shadow: 0 0 10px rgba(255, 51, 51, 1); }

        #status-bar {
            display: flex; justify-content: space-between; background-color: rgba(26, 26, 26, 0.7);
            padding: 10px 20px; font-size: 0.9rem; border: 1px solid currentColor;
            margin-bottom: 20px; backdrop-filter: blur(2px);
        }

        #terminal {
            flex-grow: 1; border: 1px solid currentColor; padding: 25px;
            overflow-y: auto; background-color: rgba(0, 5, 0, 0.8); position: relative;
            box-shadow: inset 0 0 30px rgba(currentColor, 0.2);
        }

        #terminal::-webkit-scrollbar { width: 8px; }
        #terminal::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); }
        #terminal::-webkit-scrollbar-thumb { background: currentColor; opacity: 0.5; }

        .log-line { margin: 5px 0; line-height: 1.5; font-size: 1.1rem; }
        .sys-msg { color: rgba(currentColor, 0.7); text-shadow: none; }
        .alert-msg { font-weight: bold; animation: pulse 1s infinite; }
        .critical { font-weight: bold; animation: glitch-text 0.3s infinite; }
        
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        @keyframes glitch-text {
            0% { transform: translate(0); } 20% { transform: translate(-2px, 1px); color: #fff; }
            40% { transform: translate(2px, -1px); } 60% { transform: translate(-1px, -2px); color: #f0f; }
            80% { transform: translate(1px, 2px); } 100% { transform: translate(0); }
        }

        #input-line { display: flex; margin-top: 15px; font-size: 1.1rem;}
        #cmd-input { background: transparent; border: none; color: currentColor; font-family: inherit; font-size: inherit; outline: none; flex-grow: 1; text-shadow: inherit; }

        body.state-collapsed #main-wrapper { animation: quake 0.1s infinite; }
        @keyframes quake {
            0% { transform: translate(1px, 1px); } 25% { transform: translate(-2px, -1px); }
            50% { transform: translate(-1px, 2px); } 75% { transform: translate(2px, 1px); }
            100% { transform: translate(1px, -2px); }
        }

        /* --- 时空塌缩层 --- */
        #rewind-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; z-index: 9999; display: none;
            justify-content: center; align-items: center; opacity: 0; transition: opacity 1s ease-in-out;
        }
        #rewind-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #dialogue-text {
            position: relative; z-index: 10001; color: #fff; font-size: 1.8rem;
            font-family: "SimSun", serif; text-shadow: 0 0 10px rgba(255,255,255,0.8);
            opacity: 0; transition: opacity 0.8s ease-in-out; text-align: center;
            white-space: pre-line; letter-spacing: 3px; padding: 0 50px;
        }

        /* --- 电影谢幕滚动字幕 (Credits) --- */
        #credits-container {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(0, 0, 0, 0); /* 透明背景，让后面的网格透出来 */
            z-index: 10000; display: none; overflow: hidden; pointer-events: none;
        }

        #credits-scroll {
            position: absolute; bottom: -100%; left: 50%; transform: translateX(-50%);
            text-align: center; width: 80%; color: #fff; font-family: 'Courier New', Courier, monospace;
            text-shadow: 0 0 8px #fff;
        }

        /* 滚动动画：从底部升起到顶部消失 */
        @keyframes rollCredits {
            0% { bottom: -100%; opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { bottom: 100%; opacity: 0; }
        }

        .credit-group { margin-bottom: 60px; }
        .credit-role { font-size: 1rem; color: #aaa; margin-bottom: 10px; letter-spacing: 2px; }
        .credit-name { font-size: 1.5rem; font-weight: bold; letter-spacing: 4px; }
        .credit-title { font-size: 2.5rem; font-weight: bold; margin-bottom: 80px; letter-spacing: 8px; color: #4af626;}
    </style>
</head>
<body onclick="document.getElementById('cmd-input').focus()">

    <canvas id="bg-canvas"></canvas>

    <div id="rewind-overlay">
        <canvas id="rewind-canvas"></canvas>
        <div id="dialogue-text"></div>
    </div>

    <div id="credits-container">
        <div id="credits-scroll">
            <div class="credit-title">PROJECT: MORRIS</div>
            
            <div class="credit-group">
                <div class="credit-role">制作集团</div>
                <div class="credit-name">JR游戏部</div>
            </div>
            
            <div class="credit-group">
                <div class="credit-role">审核</div>
                <div class="credit-name">JR总务部</div>
            </div>
            
            <div class="credit-group">
                <div class="credit-role">设计</div>
                <div class="credit-name">全JR集团</div>
            </div>
            
            <div class="credit-group">
                <div class="credit-role">部署</div>
                <div class="credit-name">Vercel平台</div>
            </div>

            <div class="credit-group" style="margin-top: 150px;">
                <div class="credit-role" style="font-size: 0.8rem;">感谢您的体验</div>
                <div class="credit-name" style="font-size: 1rem;">CONNECTION TERMINATED</div>
            </div>
        </div>
    </div>

    <div id="main-wrapper">
        <div id="terminal-content" style="display: flex; flex-direction: column; height: 100%;">
            <div id="status-bar">
                <span>[ 节点:康奈尔_VAX_1 ]</span>
                <span id="load-display">网络负载: 极低</span>
                <span id="fbi-trace" style="display:none;">[ 被动溯源中 ]</span>
            </div>
            <div id="terminal">
                <div id="output"></div>
                <div id="input-line">
                    <span id="prompt">morris@vax:~#</span>
                    <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" autofocus>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.onerror = function(msg, url, line) {
            document.body.innerHTML = `<div style="color:#ff3333; padding:50px; background:#000; height:100vh;">
                <h1>⚠️ 致命系统错误</h1><p>${msg} (Line ${line})</p></div>`; return false;
        };

        const output = document.getElementById('output');
        const cmdInput = document.getElementById('cmd-input');
        const loadDisplay = document.getElementById('load-display');
        const terminal = document.getElementById('terminal');
        const mainWrapper = document.getElementById('main-wrapper');
        const creditsContainer = document.getElementById('credits-container');
        const creditsScroll = document.getElementById('credits-scroll');

        let state = { isTyping: false, phase: 'prep_make', loadLevel: 0, struggleStep: 0, intervals: {} };
        const sleep = ms => new Promise(r => setTimeout(r, ms));

        // --- 动态网格背景 ---
        const bgCanvas = document.getElementById('bg-canvas');
        const bgCtx = bgCanvas.getContext('2d');
        let lines = []; let baseSpeed = 0.5;

        function initBg() {
            bgCanvas.width = window.innerWidth; bgCanvas.height = window.innerHeight;
            lines = [];
            for (let i = 0; i < 30; i++) lines.push({ x: Math.random() * bgCanvas.width, y: Math.random() * bgCanvas.height, speed: (Math.random() + 0.5) * baseSpeed, len: Math.random() * 200 + 100, vertical: Math.random() > 0.5 });
        }

        function drawBg() {
            bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
            bgCtx.strokeStyle = window.getComputedStyle(document.body).color; bgCtx.lineWidth = 1;
            for (let line of lines) {
                bgCtx.beginPath(); bgCtx.moveTo(line.x, line.y);
                if (line.vertical) { bgCtx.lineTo(line.x, line.y + line.len); line.y += line.speed; if (line.y > bgCanvas.height) line.y = -line.len; } 
                else { bgCtx.lineTo(line.x + line.len, line.y); line.x += line.speed; if (line.x > bgCanvas.width) line.x = -line.len; }
                bgCtx.stroke();
            }
            requestAnimationFrame(drawBg);
        }
        window.addEventListener('resize', initBg); initBg(); drawBg();

        // --- 系统状态循环 ---
        state.intervals.system = setInterval(() => {
            if (['struggle', 'hiding', 'collapsed'].includes(state.phase)) {
                state.loadLevel += 0.05;
                if (state.loadLevel > 1 && state.phase !== 'collapsed') {
                    state.phase = 'collapsed'; document.body.classList.add('state-collapsed'); triggerCatastrophe();
                }
                updateLoadDisplay();
            }
        }, 1500);

        function updateLoadDisplay() {
            if (state.loadLevel < 0.3) { loadDisplay.innerText = "网络负载: 极低"; } 
            else if (state.loadLevel < 0.7) { loadDisplay.innerText = "网络负载: 高 (预警)"; loadDisplay.style.color = "#ffaa00"; document.body.classList.add('state-crisis'); baseSpeed = 2; } 
            else { loadDisplay.innerText = "网络负载: 临界故障！！！"; loadDisplay.style.color = "#ff3333"; document.getElementById('fbi-trace').style.display = "inline"; baseSpeed = 5; }
        }

        cmdInput.addEventListener('keydown', e => {
            if (e.key === 'Enter' && !state.isTyping && state.phase !== 'victory') {
                let cmd = cmdInput.value.trim(); cmdInput.value = ''; handleCommand(cmd);
            }
        });

        function handleCommand(cmd) {
            echoText(`morris@vax:~# ${cmd}`, "user-cmd");
            let cmdLower = cmd.toLowerCase();

            if (state.phase === 'collapsed' && Math.random() > 0.3) { typeText("> 致命错误: I/O 死锁。", "critical"); return; }

            switch (state.phase) {
                case 'prep_make':
                    if (cmdLower === 'make') typeText("编译成功。校验和: 0xAFFED4", "sys-msg", () => state.phase = 'prep_scan');
                    else typeText("输入 'make' 初始化 Payload。", "sys-msg"); break;
                case 'prep_scan':
                    if (cmdLower === 'scan') typeText("发现漏洞节点。就绪。", "sys-msg", () => state.phase = 'prep_run');
                    else typeText("执行 'scan' 扫描网段。", "sys-msg"); break;
                case 'prep_run':
                    if (cmdLower === './worm') releaseWorm();
                    else typeText("执行 './worm' 开始测试。", "sys-msg"); break;
                case 'struggle':
                    if (cmdLower === 'ps') { typeText("PID COMMAND %CPU\n999 worm 97.5\n[警告] 增殖失控！", "alert-msg"); state.struggleStep = 1; } 
                    else if (state.struggleStep === 1 && cmdLower.startsWith('kill')) {
                        typeText("访问拒绝。\n[告警] FBI溯源中！清理日志: 'rm /var/log/lastlog'", "critical", () => state.phase = 'hiding');
                    } else typeText("输入 'ps' 检查异变！", "alert-msg"); break;
                case 'hiding':
                    if (cmdLower.includes('rm') && cmdLower.includes('log')) typeText("本地日志移除。输入 'patch' 分发补丁挽救外网。", "sys-msg", () => state.phase = 'repairing');
                    else typeText("被动溯源中！！！清理日志: 'rm /var/log/lastlog'", "critical"); break;
                case 'repairing':
                case 'collapsed':
                    if (cmdLower === 'patch') typeText("连接 SMTP...", "sys-msg", async () => { await sleep(1000); typeText("[错误] 带宽耗尽。补丁无法寄出。", "critical", triggerRewindSequence); });
                    else typeText("尝试输入 'patch' 拯救网络。", "sys-msg"); break;
                case 'rewinded':
                    if (cmdLower === 'rm worm') deleteWorm();
                    else typeText("[输入 rm worm 终结灾难。]", "sys-msg"); break;
            }
        }

        function releaseWorm() {
            state.isTyping = true;
            typeText("注入 ARPANET...", "sys-msg", async () => {
                await sleep(1000); output.innerHTML = ''; terminal.style.borderColor = "#ffaa00";
                typeText("[!!! CRITICAL !!!]\n死循环触发：WORM 正在全美节点泛洪！\n输入 'ps' 检查系统进程！", "alert-msg", () => { state.phase = 'struggle'; state.isTyping = false; state.loadLevel = 0.5; });
            });
        }

        function triggerCatastrophe() {
            if (state.intervals.mail) return; document.getElementById('bg-canvas').style.opacity = '0.1';
            state.intervals.mail = setInterval(() => {
                const msgs = [">> CMU collapsed", ">> Berkeley error", ">> KERNEL PANIC"];
                const line = document.createElement('div'); line.className = "log-line mail-flood"; line.innerText = msgs[Math.floor(Math.random() * msgs.length)];
                output.appendChild(line); terminal.scrollTop = terminal.scrollHeight;
            }, 300);
        }

        async function triggerRewindSequence() {
            state.isTyping = true; document.getElementById('input-line').style.display = 'none';
            for (let i in state.intervals) clearInterval(state.intervals[i]);
            terminal.classList.remove('shake'); document.getElementById('bg-canvas').style.opacity = '0';

            await sleep(1000);
            const rOverlay = document.getElementById('rewind-overlay');
            rOverlay.style.display = 'flex'; setTimeout(() => { rOverlay.style.opacity = 1; }, 50);

            const dt = document.getElementById('dialogue-text');
            const lines = ["“朋友，我闯大祸了。”", "“什么事？”", "“代码失控了。”", "“能补救吗？……喂？”"];
            await sleep(1500);
            for (let line of lines) {
                dt.innerText = line; dt.style.opacity = 1;
                await sleep(line.includes("……") ? 2500 : 1500); dt.style.opacity = 0; await sleep(800); 
            }
            dt.style.fontFamily = "'Courier New', monospace"; dt.color = "#4af626";
            dt.innerText = "[ 记忆回滚：重置至 18:00 ]"; dt.style.opacity = 1; await sleep(2500); dt.style.opacity = 0; await sleep(1000);

            resetGameEnvironment();
        }

        function resetGameEnvironment() {
            document.getElementById('rewind-overlay').style.opacity = 0;
            setTimeout(() => { document.getElementById('rewind-overlay').style.display = 'none'; }, 1000);
            output.innerHTML = ''; document.body.classList.remove('state-crisis', 'state-collapsed');
            terminal.style.borderColor = ""; document.getElementById('bg-canvas').style.opacity = '0.3'; baseSpeed = 0.5;
            state = { isTyping: false, phase: 'rewinded', loadLevel: 0, intervals: {} };
            updateLoadDisplay(); document.getElementById('input-line').style.display = 'flex';
            typeText("时间倒流。\n它尚未执行。\n[提示]: 输入 'rm worm' 彻底销毁它。", "sys-msg");
        }

        // =====================================
        // 核心谢幕逻辑：电影级结局
        // =====================================
        function deleteWorm() {
            state.isTyping = true;
            document.getElementById('input-line').style.display = 'none';
            typeText("正在移除二进制文件...", "sys-msg", async () => {
                await sleep(1500);
                output.innerHTML = '';
                typeText("\n[ 目标已彻底销毁 ]\nARPANET 保住了它的宁静。\n没人知道，你刚刚拯救了世界。", "success-msg", async () => {
                    
                    state.phase = 'victory';
                    
                    // 1. 终端界面淡出
                    await sleep(3000); // 让玩家看一会胜利提示
                    mainWrapper.style.opacity = '0';
                    document.body.style.color = '#ffffff'; // 切换颜色以适配结尾
                    
                    // 2. 启动 Credits 滚动
                    await sleep(2000);
                    mainWrapper.style.display = 'none'; // 彻底隐藏终端
                    creditsContainer.style.display = 'block';
                    
                    // 赋予滚动动画，持续 12 秒
                    creditsScroll.style.animation = 'rollCredits 12s linear forwards';

                    // 3. 彻底结束
                    setTimeout(() => {
                        // 可以选择重置，或保留空白
                        document.body.innerHTML = `<div style="text-align:center; margin-top:40vh; color:#fff; font-family:'Courier New'; letter-spacing: 5px;">SYSTEM HALTED</div>`;
                    }, 13000);
                });
            });
        }

        function typeText(text, className = '', callback = null) {
            state.isTyping = true; const line = document.createElement('div'); line.className = `log-line ${className}`; output.appendChild(line);
            let i = 0;
            function type() {
                if (i < text.length) { line.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i); i++; terminal.scrollTop = terminal.scrollHeight; setTimeout(type, 18); } 
                else { state.isTyping = false; if (callback) callback(); }
            }
            type();
        }

        function echoText(text, className = '') {
            const line = document.createElement('div'); line.className = `log-line ${className}`; line.innerText = text; output.appendChild(line); terminal.scrollTop = terminal.scrollHeight;
        }

        window.onload = () => { typeText("System Ready.\n[提示] 输入 'make' 编译源码。", "sys-msg"); }
    </script>
</body>
</html>
