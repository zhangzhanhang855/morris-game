<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: MORRIS // 1988 - EMERGENCY</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #4af626;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            text-shadow: 0 0 5px #4af626;
        }

        /* 顶部状态栏 */
        #status-bar {
            display: flex;
            justify-content: space-between;
            background-color: #1a1a1a;
            padding: 5px 15px;
            font-size: 0.9rem;
            border: 1px solid #4af626;
            margin-bottom: 10px;
        }

        #terminal {
            height: 75vh;
            border: 1px solid #4af626;
            padding: 20px;
            overflow-y: auto;
            background-color: #000;
            position: relative;
        }

        .log-line { margin: 3px 0; line-height: 1.4; }
        .sys-msg { color: #aaaaaa; }
        .alert-msg { color: #ff3333; font-weight: bold; }
        .user-cmd { color: #fff; }
        .mail-flood { color: #0088ff; opacity: 0.7; font-size: 0.8rem; }
        .critical { color: #ff0000; text-decoration: blink; font-weight: bold; }

        #input-line { display: flex; margin-top: 10px; }
        #cmd-input {
            background: transparent; border: none; color: #4af626;
            font-family: inherit; font-size: 1rem; outline: none; flex-grow: 1;
        }

        .hidden { display: none !important; }
        
        /* 模拟屏幕抖动 */
        .shake { animation: shake 0.2s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(1px, -1px); }
        }
    </style>
</head>
<body onclick="document.getElementById('cmd-input').focus()">

    <div id="status-bar">
        <span>节点: Cornell-U-VAX</span>
        <span id="load-display">CPU负载: 0.05</span>
        <span id="fbi-trace" style="color: #ffaa00;">FBI追踪进度: 0%</span>
    </div>
    
    <div id="terminal">
        <div id="output"></div>
        <div id="input-line">
            <span id="prompt">root@cornell:~#</span>
            <input type="text" id="cmd-input" autocomplete="off" spellcheck="false" autofocus>
        </div>
    </div>

    <script>
        const output = document.getElementById('output');
        const cmdInput = document.getElementById('cmd-input');
        const loadDisplay = document.getElementById('load-display');
        const fbiDisplay = document.getElementById('fbi-trace');
        const terminal = document.getElementById('terminal');

        let state = {
            isTyping: false,
            phase: 'intro', // intro, released, hiding, repairing, collapsed
            fbiProgress: 0,
            cpuLoad: 0.05,
            isLogCleared: false,
            mailInterval: null
        };

        // 核心循环：模拟系统逐渐崩溃
        function systemTick() {
            if (state.phase === 'repairing' || state.phase === 'collapsed') {
                state.cpuLoad += 0.08;
                if (state.cpuLoad > 20) {
                    terminal.classList.add('shake');
                }
                if (state.cpuLoad > 50) {
                    state.phase = 'collapsed';
                    triggerMailFlood();
                }
                loadDisplay.innerText = `CPU负载: ${state.cpuLoad.toFixed(2)}`;
            }

            if (state.phase === 'hiding' && !state.isLogCleared) {
                state.fbiProgress += 1;
                fbiDisplay.innerText = `FBI追踪进度: ${state.fbiProgress}%`;
                if (state.fbiProgress >= 100) {
                    gameOver("FBI 已通过路由器日志锁定你的位置。");
                }
            }
        }
        setInterval(systemTick, 1000);

        cmdInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !state.isTyping) {
                const cmd = this.value.trim().toLowerCase();
                this.value = '';
                handleCommand(cmd);
            }
        });

        function handleCommand(cmd) {
            echoText(`root@cornell:~# ${cmd}`, "user-cmd");

            if (state.phase === 'intro') {
                if (cmd === 'help') typeText("指令: ls, make, scan, ./worm", "sys-msg");
                else if (cmd === './worm') releaseWorm();
                else typeText("请按照流程操作：编译、扫描、然后执行。", "sys-msg");
            } 
            else if (state.phase === 'hiding') {
                if (cmd === 'rm -rf /var/log/lastlog' || cmd === 'clear logs') {
                    state.isLogCleared = true;
                    typeText("日志已擦除。追踪信号丢失... 但你发现系统响应越来越慢。", "sys-msg", () => {
                        state.phase = 'repairing';
                        typeText("\n[警告] 收到多封系统邮件告警。输入 'top' 查看进程。", "alert-msg");
                    });
                } else if (cmd === 'help') {
                    typeText("FBI正在追踪！快清空日志！指令：'rm -rf /var/log/lastlog'", "alert-msg");
                }
            }
            else if (state.phase === 'repairing' || state.phase === 'collapsed') {
                if (cmd === 'top') {
                    typeText(`PID  USER    CPU%   COMMAND\n1337 root    98.9   worm\n1338 root    95.2   worm\n1339 root    92.1   sendmail`, "sys-msg");
                } else if (cmd === 'killall worm') {
                    typeText("尝试终止进程... 错误：蠕虫产生速度超过杀除速度！", "critical");
                } else if (cmd === 'patch') {
                    typeText("正在尝试分发补丁邮件给其他节点...", "sys-msg", () => {
                        setTimeout(() => {
                            typeText("发送失败：邮件队列已满。SMTP服务器超时。你的网线被垃圾数据堵死了。", "critical");
                        }, 1000);
                    });
                }
            }
        }

        function releaseWorm() {
            state.isTyping = true;
            typeText("正在释放程序...", "sys-msg", () => {
                setTimeout(() => {
                    output.innerHTML = '';
                    document.body.style.backgroundColor = "#200"; // 警示色
                    typeText("====================================\n!!! 警报：ARPANET 发生大范围瘫痪 !!!\n====================================\n你意识到由于代码Bug，它在无限自我复制。\nFBI已经开始溯源追踪，快擦除你的访问日志！", "alert-msg", () => {
                        state.phase = 'hiding';
                        state.isTyping = false;
                    });
                }, 1500);
            });
        }

        // 模拟邮件系统崩溃：自动弹出干扰信息
        function triggerMailFlood() {
            if (state.mailInterval) return;
            state.mailInterval = setInterval(() => {
                const mailLogs = [
                    ">> Incoming Mail: MAIL FROM:<root@mit.edu>... QUEUE FULL",
                    ">> DEBUG: sendmail[2831]: buffer overflow detected from 128.2.1.1",
                    ">> ERROR: Connection refused by Berkeley.edu",
                    ">> SYSLOG: Disk space low on /var/spool/mqueue"
                ];
                const line = document.createElement('div');
                line.className = "log-line mail-flood";
                line.innerText = mailLogs[Math.floor(Math.random() * mailLogs.length)];
                output.appendChild(line);
                terminal.scrollTop = terminal.scrollHeight;

                // 干扰输入框：让玩家难以看清自己打的字
                if (Math.random() > 0.7) {
                    cmdInput.value += " $#@! ";
                }
            }, 800);
        }

        function typeText(text, className = '', callback = null) {
            state.isTyping = true;
            const line = document.createElement('div');
            line.className = `log-line ${className}`;
            output.appendChild(line);
            let i = 0;
            function type() {
                if (i < text.length) {
                    line.innerHTML += text.charAt(i) === '\n' ? '<br>' : text.charAt(i);
                    i++;
                    terminal.scrollTop = terminal.scrollHeight;
                    setTimeout(type, 10);
                } else {
                    state.isTyping = false;
                    if (callback) callback();
                }
            }
            type();
        }

        function echoText(text, className = '') {
            const line = document.createElement('div');
            line.className = `log-line ${className}`;
            line.innerText = text;
            output.appendChild(line);
            terminal.scrollTop = terminal.scrollHeight;
        }

        function gameOver(reason) {
            document.body.innerHTML = `<div style="text-align:center; margin-top:20vh; color:red;">
                <h1>GAME OVER</h1>
                <p>${reason}</p>
                <button onclick="location.reload()" style="background:none; color:white; border:1px solid white; padding:10px;">重启系统</button>
            </div>`;
        }

        window.onload = () => {
            typeText("Connected to Arpanet Node 10-0-2...\n输入 'help' 获取指令。", "sys-msg");
        }
    </script>
</body>
</html>
