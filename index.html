<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project: MORRIS // 1988 - REDEMPTION</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #4af626;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            text-shadow: 0 0 5px #4af626;
            transition: background-color 1s;
        }

        #status-bar {
            display: flex; justify-content: space-between;
            background-color: #1a1a1a; padding: 5px 15px;
            font-size: 0.9rem; border: 1px solid #4af626; margin-bottom: 10px;
        }

        #terminal {
            height: 75vh; border: 1px solid #4af626; padding: 20px;
            overflow-y: auto; background-color: #000; position: relative;
        }

        .log-line { margin: 3px 0; line-height: 1.4; word-wrap: break-word; }
        .sys-msg { color: #aaaaaa; text-shadow: none; }
        .alert-msg { color: #ff3333; font-weight: bold; text-shadow: 0 0 5px #ff3333; }
        .user-cmd { color: #fff; text-shadow: none; }
        .mail-flood { color: #0088ff; opacity: 0.7; font-size: 0.8rem; }
        .critical { color: #ff0000; font-weight: bold; }
        .success-msg { color: #00ff00; font-weight: bold; text-shadow: 0 0 8px #00ff00; }

        #input-line { display: flex; margin-top: 10px; }
        #cmd-input {
            background: transparent; border: none; color: #4af626;
            font-family: inherit; font-size: 1rem; outline: none; flex-grow: 1;
            text-shadow: 0 0 5px #4af626;
        }

        .shake { animation: shake 0.2s infinite; }
        @keyframes shake {
            0% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, -2px); }
            100% { transform: translate(1px, -1px); }
        }

        /* 剧场模式：回溯黑屏遮罩 */
        #rewind-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: #000; z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 1.5s ease-in-out;
        }
        
        #dialogue-text {
            color: #fff; font-size: 1.5rem; font-family: "SimSun", "Songti SC", serif;
            text-shadow: none; opacity: 0; transition: opacity 1s ease-in-out;
            text-align: center; white-space: pre-line; letter-spacing: 2px;
        }
    </style>
</head>
